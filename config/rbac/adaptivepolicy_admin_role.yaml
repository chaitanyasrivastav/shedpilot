# This rule is not used by the project shedpilot itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over resilience.shedpilot.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: shedpilot
    app.kubernetes.io/managed-by: kustomize
  name: adaptivepolicy-admin-role
rules:
- apiGroups:
  - resilience.shedpilot.io
  resources:
  - adaptivepolicies
  verbs:
  - '*'
- apiGroups:
  - resilience.shedpilot.io
  resources:
  - adaptivepolicies/status
  verbs:
  - get
