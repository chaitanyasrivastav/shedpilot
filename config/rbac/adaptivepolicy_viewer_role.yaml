# This rule is not used by the project shedpilot itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to resilience.shedpilot.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: shedpilot
    app.kubernetes.io/managed-by: kustomize
  name: adaptivepolicy-viewer-role
rules:
- apiGroups:
  - resilience.shedpilot.io
  resources:
  - adaptivepolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - resilience.shedpilot.io
  resources:
  - adaptivepolicies/status
  verbs:
  - get
