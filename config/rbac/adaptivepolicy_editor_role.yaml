# This rule is not used by the project shedpilot itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the resilience.shedpilot.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: shedpilot
    app.kubernetes.io/managed-by: kustomize
  name: adaptivepolicy-editor-role
rules:
- apiGroups:
  - resilience.shedpilot.io
  resources:
  - adaptivepolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - resilience.shedpilot.io
  resources:
  - adaptivepolicies/status
  verbs:
  - get
